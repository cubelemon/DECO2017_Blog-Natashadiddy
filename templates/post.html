<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/a11y-light.min.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/a11y-dark.min.css" media="(prefers-color-scheme: dark)">
</head>

<body>

    <nav class="notion-breadcrumb">
        <a href="index.html" class="bc-link">Natasha's Dev Blog</a>
        <span class="bc-sep">/</span>
        <a href="week{{week}}.html" class="bc-link">Week {{week}}</a>
        <span class="bc-sep">/</span>
        <span class="bc-current">{{title}}</span>
    </nav>

    <div class="page-cover"></div>

    <div class="page-icon-wrap">
        <span class="page-icon">📝</span>
    </div>

    <main class="notion-page">
        <h1 class="page-title">{{title}}</h1>

        <article>
            {{content}}
        </article>

        <div class="tags-notion">
            {{tags}}
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>

</body>

</html>
