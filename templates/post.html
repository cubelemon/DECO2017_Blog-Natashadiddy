<!DOCTYPE html>
<html>

<head>
    <title>{{title}}</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/a11y-light.min.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/a11y-dark.min.css" media="(prefers-color-scheme: dark)">
</head>

<body>

    <header class="site-header">
        <nav class="site-nav">
            <a href="index.html" class="nav-home">Natasha's Blog</a>
            <span class="nav-sep">/</span>
            <a href="week{{week}}.html" class="nav-week">Week {{week}}</a>
            <span class="nav-sep">/</span>
            <span class="nav-current">{{title}}</span>
        </nav>
    </header>

    <main>
        <h1>{{title}}</h1>

        <div class="post-meta">
            <span class="date">{{date}}</span>
            <span class="author">{{author}}</span>
        </div>

        <hr>
        <article>
            {{content}}
        </article>
        <hr>

        <footer>
            <ul class="tags-list">
                {{tags}}
            </ul>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>

</body>

</html>
