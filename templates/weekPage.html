<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week {{weekNum}} — Natasha's Dev Blog</title>
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <nav class="notion-breadcrumb">
        <a href="index.html" class="bc-link">Natasha's Dev Blog</a>
        <span class="bc-sep">/</span>
        <span class="bc-current">Week {{weekNum}}</span>
    </nav>

    <div class="page-cover"></div>

    <div class="page-icon-wrap">
        <span class="page-icon">🗓</span>
    </div>

    <main class="notion-page">
        <h1 class="page-title">Week {{weekNum}}</h1>

        <ul class="post-list">
            {{postList}}
        </ul>
    </main>

</body>

</html>
