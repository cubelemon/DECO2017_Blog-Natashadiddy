<svg width="700" height="280" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f46e5"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" rx="12" fill="#f9f9fb" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Label -->
  <text x="350" y="24" text-anchor="middle" font-size="12" fill="#888" font-style="italic">Concept decision process — Week 6</text>

  <!-- Idea boxes -->
  <rect x="16" y="50" width="158" height="48" rx="7" fill="#ede9fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="95" y="70" text-anchor="middle" font-size="12" fill="#3730a3" font-weight="600">Financial Literacy</text>
  <text x="95" y="86" text-anchor="middle" font-size="11" fill="#555">Community Hub</text>

  <rect x="16" y="116" width="158" height="48" rx="7" fill="#ede9fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="95" y="136" text-anchor="middle" font-size="12" fill="#3730a3" font-weight="600">Food Community</text>
  <text x="95" y="152" text-anchor="middle" font-size="11" fill="#555">Deals &amp; Apps</text>

  <rect x="16" y="182" width="158" height="48" rx="7" fill="#ede9fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="95" y="202" text-anchor="middle" font-size="12" fill="#3730a3" font-weight="600">Design Community</text>
  <text x="95" y="218" text-anchor="middle" font-size="11" fill="#555">Hub</text>

  <!-- Lines from ideas to team discussion -->
  <polyline points="174,74 210,140" stroke="#4f46e5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="174" y1="140" x2="210" y2="140" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>
  <polyline points="174,206 210,140" stroke="#4f46e5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Team Discussion -->
  <rect x="218" y="110" width="138" height="60" rx="7" fill="#4f46e5" stroke="#4338ca" stroke-width="1.5"/>
  <text x="287" y="134" text-anchor="middle" font-size="13" fill="white" font-weight="700">Team</text>
  <text x="287" y="152" text-anchor="middle" font-size="13" fill="white" font-weight="700">Discussion</text>

  <!-- Arrow to BrewHub -->
  <line x1="356" y1="140" x2="390" y2="140" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BrewHub -->
  <rect x="398" y="110" width="120" height="60" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="458" y="134" text-anchor="middle" font-size="13" fill="#3730a3" font-weight="700">BrewHub</text>
  <text x="458" y="152" text-anchor="middle" font-size="11" fill="#555">selected concept</text>

  <!-- Arrow to diamond -->
  <line x1="518" y1="140" x2="550" y2="140" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="575,110 610,140 575,170 540,140" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="575" y="136" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">Fits</text>
  <text x="575" y="149" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">brief?</text>

  <!-- Arrow right: Yes -->
  <line x1="610" y1="140" x2="648" y2="140" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="136" font-size="10" fill="#16a34a" font-weight="600">No</text>

  <!-- Arrow down: Pivot -->
  <line x1="575" y1="170" x2="575" y2="208" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>

  <!-- Pivot box -->
  <rect x="520" y="214" width="110" height="44" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="575" y="232" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">Pivot</text>
  <text x="575" y="248" text-anchor="middle" font-size="11" fill="#92400e">→ Week 7</text>
</svg>
