<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="680" height="320" rx="12" fill="#f9f9fb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="340" y="24" text-anchor="middle" font-size="12" fill="#888" font-style="italic">SEAblings — core entity relationships</text>

  <!-- Users -->
  <rect x="30" y="120" width="120" height="70" rx="8" fill="#4f46e5" stroke="#4338ca" stroke-width="1.5"/>
  <text x="90" y="148" text-anchor="middle" font-size="13" fill="white" font-weight="700">Users</text>
  <text x="90" y="166" text-anchor="middle" font-size="10" fill="#c7d2fe">post recipes</text>
  <text x="90" y="180" text-anchor="middle" font-size="10" fill="#c7d2fe">confirm locations</text>

  <!-- Recipes -->
  <rect x="240" y="50" width="130" height="70" rx="8" fill="#ede9fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="305" y="78" text-anchor="middle" font-size="13" fill="#3730a3" font-weight="700">Recipes</text>
  <text x="305" y="96" text-anchor="middle" font-size="10" fill="#555">title, description</text>
  <text x="305" y="110" text-anchor="middle" font-size="10" fill="#555">instructions, photo</text>

  <!-- Ingredients -->
  <rect x="240" y="190" width="130" height="70" rx="8" fill="#ede9fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="305" y="218" text-anchor="middle" font-size="13" fill="#3730a3" font-weight="700">Ingredients</text>
  <text x="305" y="236" text-anchor="middle" font-size="10" fill="#555">name, category</text>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="#555">shared across recipes</text>

  <!-- Locations -->
  <rect x="470" y="190" width="140" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="540" y="218" text-anchor="middle" font-size="13" fill="#065f46" font-weight="700">Locations</text>
  <text x="540" y="236" text-anchor="middle" font-size="10" fill="#374151">store, suburb</text>
  <text x="540" y="250" text-anchor="middle" font-size="10" fill="#374151">lat / lng, confirmed</text>

  <!-- Map -->
  <rect x="470" y="50" width="140" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="540" y="78" text-anchor="middle" font-size="13" fill="#92400e" font-weight="700">Interactive Map</text>
  <text x="540" y="96" text-anchor="middle" font-size="10" fill="#78350f">pins per ingredient</text>
  <text x="540" y="110" text-anchor="middle" font-size="10" fill="#78350f">filterable by suburb</text>

  <!-- User → Recipes -->
  <line x1="150" y1="135" x2="238" y2="95" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="110" text-anchor="middle" font-size="10" fill="#4f46e5" transform="rotate(-22,188,110)">posts</text>

  <!-- User → Locations -->
  <line x1="150" y1="165" x2="238" y2="215" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="200" text-anchor="middle" font-size="10" fill="#4f46e5" transform="rotate(22,185,200)">confirms</text>

  <!-- Recipes → Ingredients (join) -->
  <line x1="305" y1="120" x2="305" y2="188" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="316" y="158" font-size="10" fill="#4f46e5">uses</text>

  <!-- Ingredients → Locations -->
  <line x1="370" y1="225" x2="468" y2="225" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="218" text-anchor="middle" font-size="10" fill="#059669">has</text>

  <!-- Locations → Map -->
  <line x1="540" y1="190" x2="540" y2="122" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="160" font-size="10" fill="#d97706">pins</text>

  <!-- Recipes → Map (dashed) -->
  <line x1="370" y1="80" x2="468" y2="80" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="416" y="74" text-anchor="middle" font-size="10" fill="#d97706">context for</text>
</svg>
